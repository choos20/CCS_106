<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindTwister · Memory Match</title>

  <!-- Bootstrap + Retro Font -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../ALL_CSS/style.css">
</head>
<body>

<div class="container text-center mt-4">
  <!-- Top bar: logout & settings -->
  <div class="top-actions">
    <button class="btn btn-warning btn-sm ms-2" id="settingsBtn">⚙ Settings</button>
    <button class="btn btn-info btn-sm ms-2" id="pauseBtn">⏸️ Pause</button>
    <a href="../ALL_PHP/dashboard.php" class="btn btn-danger btn-sm game-btn">⬅️ Back to game lobby</a>
    <a href="../ALL_PHP/logout.php" class="btn btn-danger btn-sm logout-btn">🚪 Logout</a>
  </div>

  <!-- Title with gradient -->
  <h1 class="fw-bold mb-3">🎮 MindTwister 🧠</h1>

  <!-- Stats row (enhanced) -->
  <div class="stats-row">
    <div class="stat-card lives-card">❤️ Lives: <span id="lives">0</span></div>
    <div class="stat-card matches-card">🏆 Matches: <span id="matches">0</span></div>
    <div class="stat-card moves-card">🔄 Moves: <span id="moves">0</span></div>
  </div>

  <!-- Timer & High Score -->
  <div class="timer-row">
    <div class="timer-box">⏱ Time: <span id="timer">00:00</span></div>
    <div class="timer-box">🏅 Best: <span id="bestTime">-</span></div>
  </div>

  <!-- Message area -->
  <p id="message" class="fw-semibold text-warning mt-3"></p>

  <!-- Level & Start -->
  <div class="setup-panel">
    <select id="level" class="form-select form-select-lg mb-3">
      <option value="" selected disabled>🎚️ Select Level</option>
      <option value="1">Level 1 (2x2)</option>
      <option value="2">Level 2 (3x3)</option>
      <option value="3">Level 3 (4x4)</option>
      <option value="4">Level 4 (5x5)</option>
      <option value="5">Level 5 (6x6)</option>
    </select>
    <button id="startGameBtn" class="btn-glow btn-start mb-2">▶ Start Game</button>
    <button id="restartBtn" class="btn-glow btn-restart">⟲ Restart Level</button>
  </div>

  <!-- Category Cards (hidden until level chosen) -->
  <div class="category-container mb-4 d-none" id="categoryCards"></div>

  <!-- Game Board (hidden until game starts) -->
  <div id="gameBoard" class="game-board mt-4 d-none"></div>

  <!-- Hint button (visible only for level >=3, one use) -->
  <button id="hintBtn" class="btn-glow btn-hint mt-2 d-none">💡 Hint (3 sec)</button>

  <!-- Win action button (Next / Restart) -->
  <button id="winActionBtn" class="btn-glow btn-win w-100 mt-2 d-none"></button>
</div>

<!-- Fun Fact Modal (Free life with countdown) -->
<div class="modal fade" id="funFactModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-modal">
      <div class="modal-header"><h5 class="modal-title">📘 Fun Facts!</h5></div>
      <div class="modal-body">
        <ul id="funFactsList" class="small"></ul>
        <div class="text-center mt-3">
          <p class="text-warning">⏳ Free life available in <span id="freeLifeTimer">15</span>s</p>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-warning" id="closeFunFact" disabled>✅ Use 1 Free Life</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal (sound, music, volume) -->
<div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm">
    <div class="modal-content glass-modal">
      <div class="modal-header"><h5 class="modal-title">⚙ Settings</h5></div>
      <div class="modal-body">
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="soundToggle" checked>
          <label class="form-check-label">🔊 Sound Effects</label>
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="musicToggle">
          <label class="form-check-label">🎵 Background Music</label>
        </div>
        <div class="mb-3">
          <label class="form-label">🔊 Music Volume</label>
          <input type="range" class="form-range" id="musicVolume" min="0" max="100" value="50">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Hidden background music element -->
<audio id="bgMusic" loop preload="auto">
  <source src="../Music/older.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script src="../ALL_JS/script.js"></script>
</body>
</html>
